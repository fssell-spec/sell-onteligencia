version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sell_inteligencia_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sell_inteligencia
      POSTGRES_USER: sell_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sell_password}
    ports:
      - "5432:5432"
    volumes:
      - sell_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sell_user -d sell_inteligencia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sell_pg_data:
    driver: local
